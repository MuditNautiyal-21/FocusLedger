<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 300px;
    min-height: 180px;
    font-family: 'Segoe UI', -apple-system, sans-serif;
    background: #0A0E1A;
    color: #F1F5F9;
    padding: 16px;
  }
  .header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 16px;
  }
  .logo {
    width: 28px; height: 28px;
    background: #3B82F6;
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-weight: bold; font-size: 11px; color: white;
  }
  .title { font-size: 14px; font-weight: 600; }
  .status-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 12px;
    border-radius: 8px;
    background: #111827;
    border: 1px solid rgba(255,255,255,0.06);
    margin-bottom: 10px;
  }
  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .dot.green { background: #10B981; }
  .dot.red { background: #EF4444; }
  .dot.yellow { background: #F59E0B; }
  .status-text { font-size: 12px; color: #94A3B8; }
  .status-text strong { color: #F1F5F9; }
  .cls-row {
    padding: 10px 12px;
    border-radius: 8px;
    background: #111827;
    border: 1px solid rgba(255,255,255,0.06);
    margin-bottom: 12px;
    font-size: 12px;
    color: #94A3B8;
  }
  .cls-label {
    font-weight: 600;
    font-size: 13px;
  }
  .cls-label.productive { color: #10B981; }
  .cls-label.non-productive { color: #EF4444; }
  .cls-label.neutral { color: #6B7280; }
  .cls-label.unclassified { color: #475569; }
  .link-btn {
    display: block;
    text-align: center;
    padding: 8px;
    border-radius: 8px;
    background: rgba(59,130,246,0.1);
    border: 1px solid rgba(59,130,246,0.3);
    color: #3B82F6;
    font-size: 12px;
    font-weight: 500;
    text-decoration: none;
    cursor: pointer;
    transition: background 0.15s;
  }
  .link-btn:hover { background: rgba(59,130,246,0.2); }
</style>
</head>
<body>
  <div class="header">
    <div class="logo">FL</div>
    <div class="title">FocusLedger</div>
  </div>

  <div class="status-row">
    <div class="dot" id="statusDot"></div>
    <div class="status-text" id="statusText">Checking...</div>
  </div>

  <div class="cls-row">
    <div>Current tab:</div>
    <div class="cls-label" id="clsLabel" style="margin-top:4px">—</div>
    <div id="domainText" style="margin-top:2px; font-size:11px; color:#475569">—</div>
  </div>

  <a class="link-btn" id="openApp" href="#">Open FocusLedger</a>

<script src="popup.js"></script>
</body>
</html>
